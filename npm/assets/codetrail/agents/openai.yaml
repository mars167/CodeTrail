interface:
  display_name: "CodeTrail"
  short_description: "Use indexed CodeTrail search with evidence subagents"
  search_terms:
    - "codetrail"
    - "code search"
    - "source evidence"
    - "subagent evidence"
  default_prompt: "Use $codetrail for narrow, verifiable source evidence. For multi-step investigations, check codetrail --output json index status --summary, then start with codetrail --output json explore node <query> --max-candidates 5 --snippet-lines 24 --relation-limit 8. Use at most one narrow defs/symbols/refs/routes/calls/callers supplement before source verification. CodeTrail does not provide read/list/tree; use host source-read tools for verification. Treat precise_fact, parser_fact, inferred_candidate, and source_fact according to their caveats."
