interface:
  display_name: "CodeTrail"
  short_description: "Use indexed CodeTrail search with evidence subagents"
  search_terms:
    - "codetrail"
    - "code search"
    - "source evidence"
    - "subagent evidence"
  default_prompt: "Use $codetrail for narrow, verifiable source evidence. For multi-step investigations, check codetrail --output json index status --summary, then start with codetrail --output json explore flow <query> --max-nodes 8 --snippet-lines 8 --relation-limit 8 --max-bytes 12000. Use codetrail --output json explore node <query> --compact --max-candidates 2 --snippet-lines 8 --relation-limit 4 --max-bytes 8000 only when flow misses a needed node. Use at most one narrow defs/symbols/refs/routes/calls/callers supplement before source verification. CodeTrail does not provide read/list/tree; use host source-read tools for verification. Treat precise_fact, parser_fact, inferred_candidate, and source_fact according to their caveats."
