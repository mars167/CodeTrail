interface:
  display_name: "CodeTrail"
  short_description: "Use CodeTrail only for semantic index lookups"
  search_terms:
    - "codetrail"
    - "semantic index"
    - "definitions"
    - "references"
    - "callers"
  default_prompt: "Use $codetrail only for symbols, definitions, precise references, and call/caller relationships that bash search cannot answer cleanly. Use rg/fd/git/host reads for text, path, file, and Git workflows. Do not use CodeTrail for broad exploration or call explore node/find/grep/files/glob/read/list/tree. If refs reports missing precise SCIP index, use rg for textual matches or run codetrail --output json index doctor."
