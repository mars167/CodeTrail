interface:
  display_name: "CodeTrail"
  short_description: "Use indexed CodeTrail search with evidence subagents"
  search_terms:
    - "codetrail"
    - "code search"
    - "source evidence"
    - "subagent evidence"
  default_prompt: "Use $codetrail for narrow, verifiable source evidence. Prefer index-backed CodeTrail commands for discovery: symbols, defs, refs, routes, calls, callers, find, grep, files, find-path, and glob. Do not count list, tree, or read as indexed discovery; use normal source-read tools or codetrail read only for verification. For API, login, user-management, permission, or data-model flow investigations, start with routes for the domain terms, then verify controller, service, model, mapper/repository, and auth boundaries with focused reads before drawing a flow. For multi-step repository investigation, delegate to the CodeTrail evidence subagent template when available; keep CodeTrail itself as the search/navigation tool layer, not a task-planning command."
