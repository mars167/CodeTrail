name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish, for example v0.1.1. Defaults to the selected ref.'
        required: false
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codetrail-linux-amd64
            smoke: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: codetrail-linux-arm64
            smoke: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: codetrail-darwin-amd64
            smoke: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: codetrail-darwin-arm64
            smoke: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codetrail-windows-amd64.exe
            smoke: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: codetrail-windows-arm64.exe
            # Cross-compiled; cannot execute on the x64 runner.
            smoke: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify static CRT (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          exe="target/${{ matrix.target }}/release/codetrail.exe"
          # A dynamically linked CRT shows up as a VCRUNTIME140*.dll entry in
          # the PE import table. Shipping such a binary makes codetrail exit
          # silently (STATUS_DLL_NOT_FOUND) on Windows machines without the
          # VC++ Redistributable installed.
          if grep -qia "VCRUNTIME140" "$exe"; then
            echo "ERROR: $exe references VCRUNTIME140.dll (dynamic CRT)." >&2
            echo "Ensure .cargo/config.toml applies -C target-feature=+crt-static for MSVC targets." >&2
            exit 1
          fi
          echo "OK: no VC++ runtime DLL dependency detected."

      - name: Smoke test binary
        if: matrix.smoke
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/codetrail"
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="$bin.exe"
          fi
          "$bin" --version
          out="$("$bin" --output json files Cargo)"
          if [ -z "$out" ]; then
            echo "ERROR: smoke query produced no output." >&2
            exit 1
          fi
          printf '%s\n' "$out" | head -c 400
          echo

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz codetrail
          mv ${{ matrix.artifact }}.tar.gz ${{ github.workspace }}/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }}.zip codetrail.exe
          mv ${{ matrix.artifact }}.zip ${{ github.workspace }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.inputs.tag || github.ref_name, 'v')
    permissions:
      contents: write
    env:
      GITEA_REPOSITORY: ${{ vars.GITEA_REPOSITORY }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      GITEA_URL: ${{ vars.GITEA_URL }}
      GITEA_INSECURE_TLS: ${{ vars.GITEA_INSECURE_TLS }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release target
        id: release-target
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          assets=(
            codetrail-darwin-amd64.tar.gz
            codetrail-darwin-arm64.tar.gz
            codetrail-linux-amd64.tar.gz
            codetrail-linux-arm64.tar.gz
            codetrail-windows-amd64.exe.zip
            codetrail-windows-arm64.exe.zip
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          sha256sum "${assets[@]}" > SHA256SUMS
          ls -lh

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
            if [[ "$RELEASE_TAG" == *-* ]]; then
              gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --prerelease
            fi
          else
            release_flags=()
            if [[ "$RELEASE_TAG" == *-* ]]; then
              release_flags=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              "${release_flags[@]}" \
              --notes "Automated release for ${RELEASE_TAG}."
          fi

      - name: Publish Gitea release assets
        if: env.GITEA_TOKEN != ''
        env:
          TARGET_SHA: ${{ steps.release-target.outputs.sha }}
        shell: bash
        run: scripts/upload-gitea-release-assets.sh dist
