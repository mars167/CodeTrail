name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_bench:
        description: Run benchmark regression gate
        required: false
        default: "false"
  schedule:
    - cron: "17 19 * * *"

concurrency:
  group: quality-gate-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CODETRAIL_CACHE_ROOT: /opt/hostedtoolcache/codetrail
  CARGO_HOME: /opt/hostedtoolcache/codetrail/cargo
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "2"
  RUOYI_REPO_URL: https://git.home.arpa/mars/RuoYi.git
  RUOYI_BRANCH: master
  RUOYI_CACHE_DIR: /opt/hostedtoolcache/codetrail/fixtures/RuoYi

jobs:
  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    env:
      CARGO_TARGET_DIR: /opt/hostedtoolcache/codetrail/target/pr-gate
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Prepare CI tools
        run: |
          mkdir -p "$CODETRAIL_CACHE_ROOT"
          mkdir -p "$CARGO_HOME"
          mkdir -p "$CARGO_TARGET_DIR"
          if ! command -v protoc >/dev/null 2>&1 || ! command -v node >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git ca-certificates nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang
          fi
          rustup component add rustfmt rust-src
      - name: Configure internal Gitea TLS
        run: git config --global http.https://git.home.arpa/.sslVerify false
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run PR quality gate
        run: scripts/quality-gate.sh pr

  main-gate:
    name: Main Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      CARGO_TARGET_DIR: /opt/hostedtoolcache/codetrail/target/main-gate
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Prepare CI tools
        run: |
          mkdir -p "$CODETRAIL_CACHE_ROOT"
          mkdir -p "$CARGO_HOME"
          mkdir -p "$CARGO_TARGET_DIR"
          if ! command -v protoc >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1 || ! command -v node >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git ca-certificates jq nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang
          fi
          rustup component add rustfmt rust-src
      - name: Configure internal Gitea TLS
        run: git config --global http.https://git.home.arpa/.sslVerify false
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare RuoYi fixture cache
        run: scripts/prepare-ruoyi-fixture.sh
      - name: Run main quality gate
        run: scripts/quality-gate.sh main
        env:
          REQUIRE_TEST_REPO: "1"
          TEST_REPO: ${{ env.RUOYI_CACHE_DIR }}

  cross-check:
    name: Cross-Platform Check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    env:
      CARGO_TARGET_DIR: /opt/hostedtoolcache/codetrail/target/cross-check
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Prepare cross tools
        run: |
          mkdir -p "$CODETRAIL_CACHE_ROOT"
          mkdir -p "$CARGO_HOME"
          mkdir -p "$CARGO_TARGET_DIR"
          if ! command -v x86_64-w64-mingw32-gcc >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git ca-certificates nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang mingw-w64
          fi
          rustup component add rust-src
          rustup target add x86_64-pc-windows-gnu
      - name: Configure internal Gitea TLS
        run: git config --global http.https://git.home.arpa/.sslVerify false
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cross-compile check (Windows)
        run: cargo check --locked --target x86_64-pc-windows-gnu

  bench:
    name: Benchmark Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_bench == 'true') }}
    env:
      CARGO_TARGET_DIR: /opt/hostedtoolcache/codetrail/target/bench
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Prepare benchmark tools
        run: |
          mkdir -p "$CODETRAIL_CACHE_ROOT"
          mkdir -p "$CARGO_HOME"
          mkdir -p "$CARGO_TARGET_DIR"
          if ! command -v hyperfine >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git ca-certificates jq bc hyperfine nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang
          fi
          rustup component add rustfmt rust-src
      - name: Configure internal Gitea TLS
        run: git config --global http.https://git.home.arpa/.sslVerify false
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare RuoYi fixture cache
        run: scripts/prepare-ruoyi-fixture.sh
      - name: Run benchmark quality gate
        run: scripts/quality-gate.sh bench
        env:
          REQUIRE_TEST_REPO: "1"
          TEST_REPO: ${{ env.RUOYI_CACHE_DIR }}
